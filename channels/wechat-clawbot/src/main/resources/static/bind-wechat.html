<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>绑定微信ClawBot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB',
            'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .guide {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 8px;
        }

        .guide h3 {
            color: #667eea;
            margin-bottom: 12px;
            font-size: 16px;
        }

        .guide ol {
            padding-left: 20px;
            color: #555;
            line-height: 1.8;
        }

        .guide li {
            margin-bottom: 8px;
        }

        .qr-section {
            text-align: center;
            margin: 30px 0;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .qr-container {
            display: none;
            margin-top: 30px;
            animation: fadeIn 0.5s ease;
        }

        .qr-container.show {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .qr-image {
            width: 280px;
            height: 280px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 10px;
            background: white;
            margin: 0 auto 20px;
        }

        .status-text {
            color: #666;
            font-size: 14px;
            margin-top: 15px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 6px;
        }

        .status-text.success {
            color: #52c41a;
            background: #f6ffed;
            border: 1px solid #b7eb8f;
        }

        .status-text.error {
            color: #ff4d4f;
            background: #fff2f0;
            border: 1px solid #ffccc7;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .timer {
            color: #999;
            font-size: 13px;
            margin-top: 10px;
        }

        .success-message {
            display: none;
            text-align: center;
            padding: 30px;
            animation: fadeIn 0.5s ease;
        }

        .success-message.show {
            display: block;
        }

        .success-icon {
            font-size: 64px;
            color: #52c41a;
            margin-bottom: 20px;
        }

        .success-message h2 {
            color: #52c41a;
            margin-bottom: 10px;
        }

        .success-message p {
            color: #666;
            margin-bottom: 20px;
        }

        .btn-close {
            background: #52c41a;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-close:hover {
            background: #73d13d;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🤖 绑定微信ClawBot</h1>
        <p>将您的微信账号与JobClaw系统绑定，实现智能消息推送</p>
    </div>

    <div class="guide">
        <h3>📋 绑定指引</h3>
        <ol>
            <li>点击下方"生成二维码"按钮</li>
            <li>使用微信扫描弹出的二维码</li>
            <li>在手机上确认授权登录</li>
            <li>等待页面自动检测绑定状态</li>
            <li>绑定成功后即可接收智能通知</li>
        </ol>
    </div>

    <div class="qr-section" id="qrSection">
        <button class="btn-primary" id="generateBtn" onclick="generateQrCode()">
            生成二维码
        </button>

        <div class="qr-container" id="qrContainer">
            <div class="status-text" id="statusText">
                <span class="loading"></span>
                正在打开二维码页面...
            </div>
            <div class="timer" id="timer">二维码有效期: 5分钟</div>
        </div>
    </div>

    <div class="success-message" id="successMessage">
        <div class="success-icon">✓</div>
        <h2>绑定成功！</h2>
        <p>您的微信账号已成功绑定到JobClaw系统</p>
        <p>账号ID: <strong id="accountId"></strong></p>
        <button class="btn-close" onclick="closeWindow()">关闭窗口</button>
    </div>
</div>

<script>
    let qrCode = null;
    let checkInterval = null;
    let countdownInterval = null;
    let expireTime = null;

    // 生成二维码
    async function generateQrCode() {
        const btn = document.getElementById('generateBtn');
        const container = document.getElementById('qrContainer');

        btn.disabled = true;
        btn.innerHTML = '<span class="loading"></span>生成中...';

        try {
            const response = await fetch('/api/wechat/clawbot/qrcode', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            });

            const result = await response.json();

            // 解析封装后的响应格式
            if (result.code !== 0) {
                alert('生成二维码失败: ' + (result.msg || '未知错误'));
                btn.disabled = false;
                btn.innerHTML = '生成二维码';
                return;
            }

            const data = result.data;

            if (!data.success) {
                alert('生成二维码失败: ' + data.msg);
                btn.disabled = false;
                btn.innerHTML = '生成二维码';
                return;
            }

            qrCode = data.qrCode;

            // 在新窗口中打开二维码页面
            const qrWindow = window.open(data.qrUrl, '_blank', 'width=500,height=900');
            
            if (!qrWindow) {
                alert('浏览器阻止了弹窗，请允许弹窗后重试');
                btn.disabled = false;
                btn.innerHTML = '生成二维码';
                return;
            }

            container.classList.add('show');
            btn.style.display = 'none';

            // 开始检查状态
            startCheckingStatus();

            // 开始倒计时
            startCountdown(5 * 60); // 5分钟

        } catch (error) {
            console.error('Error:', error);
            alert('网络错误，请重试');
            btn.disabled = false;
            btn.innerHTML = '生成二维码';
        }
    }

    // 开始检查登录状态
    function startCheckingStatus() {
        const statusText = document.getElementById('statusText');

        checkInterval = setInterval(async () => {
            if (!qrCode) return;

            try {
                const response = await fetch(`/api/wechat/clawbot/status?qrCode=${encodeURIComponent(qrCode)}`);
                const result = await response.json();

                // 解析封装后的响应格式
                if (result.code !== 0) {
                    console.error('Check status failed:', result.msg);
                    return;
                }

                const data = result.data;

                if (data.success && data.accountId) {
                    // 绑定成功
                    clearInterval(checkInterval);
                    clearInterval(countdownInterval);

                    document.getElementById('accountId').textContent = data.accountId;
                    document.getElementById('qrSection').style.display = 'none';
                    document.getElementById('successMessage').classList.add('show');

                } else {
                    // 更新状态文本
                    updateStatusText(data.msg);
                }
            } catch (error) {
                console.error('Check status error:', error);
            }
        }, 2000); // 每2秒检查一次
    }

    // 更新状态文本
    function updateStatusText(msg) {
        const statusText = document.getElementById('statusText');

        if (msg.includes('Waiting') || msg.includes('waiting')) {
            statusText.innerHTML = '<span class="loading"></span>请在新窗口中使用微信扫描二维码...';
            statusText.className = 'status-text';
        } else if (msg.includes('Scanned') || msg.includes('scanned')) {
            statusText.innerHTML = '✓ 已扫描，请在手机上确认登录';
            statusText.className = 'status-text';
        } else if (msg.includes('expired')) {
            statusText.innerHTML = '✗ 二维码已过期，请重新生成';
            statusText.className = 'status-text error';
            clearInterval(checkInterval);
            clearInterval(countdownInterval);
            document.getElementById('generateBtn').style.display = 'inline-block';
            document.getElementById('generateBtn').disabled = false;
            document.getElementById('generateBtn').innerHTML = '重新生成二维码';
        } else {
            statusText.textContent = msg;
            statusText.className = 'status-text';
        }
    }

    // 开始倒计时
    function startCountdown(seconds) {
        expireTime = Date.now() + seconds * 1000;
        const timerElement = document.getElementById('timer');

        countdownInterval = setInterval(() => {
            const remaining = Math.max(0, Math.floor((expireTime - Date.now()) / 1000));
            const minutes = Math.floor(remaining / 60);
            const secs = remaining % 60;

            timerElement.textContent = `二维码有效期: ${minutes}分${secs.toString().padStart(2, '0')}秒`;

            if (remaining <= 0) {
                clearInterval(countdownInterval);
                updateStatusText('二维码已过期');
            }
        }, 1000);
    }

    // 关闭窗口
    function closeWindow() {
        window.close();
        // 如果window.close()不起作用（浏览器限制），则重定向
        setTimeout(() => {
            window.location.href = '/';
        }, 500);
    }

    // 页面加载完成后的初始化
    window.onload = function() {
        console.log('微信ClawBot绑定页面已加载');
    };

    // 页面卸载时清理定时器
    window.onbeforeunload = function() {
        if (checkInterval) clearInterval(checkInterval);
        if (countdownInterval) clearInterval(countdownInterval);
    };
</script>
</body>
</html>
