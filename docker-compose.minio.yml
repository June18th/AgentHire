services:
  minio:
    image: minio/minio:latest
    container_name: jobclaw-minio
    command: server /data --console-address ":9001"
    environment:
      TZ: "Asia/Shanghai"
      MINIO_ROOT_USER: "${MINIO_ACCESS_KEY:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_SECRET_KEY:-minioadmin}"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - jobclaw-minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  jobclaw:
    depends_on:
      minio:
        condition: service_healthy
    environment:
      JOBCLAW_IMG_STORAGE_TYPE: "minio"
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY:-minioadmin}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY:-minioadmin}"
      MINIO_BUCKET: "${MINIO_BUCKET:-jobclaw}"
      MINIO_BUCKET_PUBLIC_IMAGE: "${MINIO_BUCKET_PUBLIC_IMAGE:-jobclaw-public}"
      MINIO_BUCKET_PRIVATE_MATERIAL: "${MINIO_BUCKET_PRIVATE_MATERIAL:-jobclaw-private}"
      MINIO_BUCKET_TEMP: "${MINIO_BUCKET_TEMP:-jobclaw-temp}"
      MINIO_BUCKET_EXPORT: "${MINIO_BUCKET_EXPORT:-jobclaw-export}"
      JOBCLAW_IMG_CDN_HOST: "http://localhost:8087"

volumes:
  jobclaw-minio-data:
