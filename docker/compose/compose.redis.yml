name: jobclaw

services:
  redis:
    image: redis:7.4-alpine
    container_name: jobclaw-redis
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - "${REDIS_PASSWORD:-jobclaw_redis}"
    environment:
      TZ: "Asia/Shanghai"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-jobclaw_redis}"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - jobclaw-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD:-jobclaw_redis}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  jobclaw:
    depends_on:
      redis:
        condition: service_healthy
    environment:
      JOBCLAW_REDIS_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-jobclaw_redis}"
      REDIS_DATABASE: "${REDIS_DATABASE:-0}"

volumes:
  jobclaw-redis-data:
