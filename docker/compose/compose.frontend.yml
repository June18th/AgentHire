name: jobclaw

services:
  jobclaw:
    build:
      context: ../..
      dockerfile: docker/api/Dockerfile
      args:
        MAVEN_PROFILE: prod
    image: jobclaw-api:prod
    container_name: jobclaw
    env_file:
      - ../../.env
    ports:
      - "8087:8087"
      - "8099:8099"
    environment:
      TZ: "Asia/Shanghai"
      JAVA_TOOL_OPTIONS: "-Duser.timezone=Asia/Shanghai"
      SPRING_PROFILES_ACTIVE: "prod"
      JOBCLAW_SERVER_PORT: "8087"
      JOBCLAW_SITE_WEBSITE_HOST: "http://localhost:${JOBCLAW_GATEWAY_PORT:-8088}"
      JOBCLAW_SITE_WEB_SITE_URL: "http://localhost:${JOBCLAW_GATEWAY_PORT:-8088}"
      JOBCLAW_SITE_AUTO_OPEN: "false"
      JOBCLAW_IMG_CDN_HOST: "http://localhost:${JOBCLAW_GATEWAY_PORT:-8088}"
      JOBCLAW_DATABASE_NAME: ${MYSQL_DATABASE:-jobclaw}
      DATABASE_HOST: mysql
      DATABASE_PORT: "3306"
      DATABASE_USERNAME: root
      DATABASE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-jobclaw_root}
      DATABASE_LIQUIBASE_ENABLED: "true"
      JOBCLAW_REDIS_ENABLED: "false"
      MANAGEMENT_HEALTH_REDIS_ENABLED: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-jobclaw_redis}
      REDIS_DATABASE: ${REDIS_DATABASE:-0}
      AGENT_WORKSPACE: "file:/app/workspace/"
      JOBCLAW_IMG_ABS_TMP_PATH: "/app/workspace/storage/"
      AGENT_MCP_CLIENT_ENABLED: "false"
      AGENT_CHANNEL_WECHAT_CLAWBOT_ENABLED: "true"
      AGENT_CHANNEL_DINGDING_ENABLED: "true"
      AGENT_CHANNEL_FEISHU_ENABLED: "true"
      SPRING_AUTOCONFIGURE_EXCLUDE: "org.springframework.boot.data.redis.autoconfigure.RedisAutoConfiguration,org.springframework.boot.data.redis.autoconfigure.RedisReactiveAutoConfiguration,org.springframework.boot.data.redis.autoconfigure.RedisRepositoriesAutoConfiguration,org.springframework.boot.actuate.autoconfigure.data.redis.RedisReactiveHealthContributorAutoConfiguration,org.springframework.ai.model.zhipuai.autoconfigure.ZhiPuAiChatAutoConfiguration,org.springframework.ai.model.zhipuai.autoconfigure.ZhiPuAiEmbeddingAutoConfiguration,org.springframework.ai.model.zhipuai.autoconfigure.ZhiPuAiImageAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration,com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAgentAutoConfiguration,com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAsyncToolCallingManagerAutoConfiguration,com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAudioSpeechAutoConfiguration,com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAudioTranscriptionAutoConfiguration,com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeChatAutoConfiguration,com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeEmbeddingAutoConfiguration,com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeImageAutoConfiguration,com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeRerankAutoConfiguration,com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeVideoAutoConfiguration"
    volumes:
      - ../../workspace:/app/workspace
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8087/actuator/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 50s
    restart: unless-stopped

  jobclaw-web:
    build:
      context: ../..
      dockerfile: docker/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    image: jobclaw-web:prod
    container_name: jobclaw-web
    depends_on:
      jobclaw:
        condition: service_healthy
    restart: unless-stopped

  jobclaw-gateway:
    image: nginx:1.27-alpine
    container_name: jobclaw-gateway
    depends_on:
      - jobclaw-web
      - jobclaw
    ports:
      - "${JOBCLAW_GATEWAY_PORT:-8088}:80"
    volumes:
      - ../../docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
