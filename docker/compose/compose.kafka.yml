name: jobclaw

services:
  kafka:
    image: apache/kafka:3.9.1
    container_name: jobclaw-kafka
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      # INTERNAL is used by containers; EXTERNAL is mapped to the host's KAFKA_PORT.
      KAFKA_LISTENERS: "INTERNAL://:9092,EXTERNAL://:29092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka:9092,EXTERNAL://localhost:${KAFKA_PORT:-9092}"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: "3"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "1"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      TZ: "Asia/Shanghai"
    ports:
      # Host clients use localhost:${KAFKA_PORT:-9092}; Kafka is not an HTTP service.
      - "${KAFKA_PORT:-9092}:29092"
    volumes:
      - jobclaw-kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null"]
      interval: 10s
      timeout: 8s
      retries: 18
      start_period: 30s
    restart: unless-stopped

  jobclaw:
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      JOBCLAW_MQ_ENABLED: "true"
      JOBCLAW_MQ_PROVIDER: "kafka"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"

volumes:
  jobclaw-kafka-data:
