services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.5
    container_name: jobclaw-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m -Duser.timezone=Asia/Shanghai"
      TZ: Asia/Shanghai
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    volumes:
      - jobclaw-elasticsearch-data:/usr/share/elasticsearch/data
      - ./docker/elasticsearch/log4j2.properties:/usr/share/elasticsearch/config/log4j2.properties:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s' >/dev/null"]
      interval: 10s
      timeout: 8s
      retries: 18
      start_period: 30s
    restart: unless-stopped

  jobclaw:
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      JOBCLAW_SEARCH_ES_ENABLED: "true"
      ELASTICSEARCH_ENDPOINT: "http://elasticsearch:9200"
      JOBCLAW_SEARCH_ES_INDEX: "jobclaw_oc_job"

volumes:
  jobclaw-elasticsearch-data:
